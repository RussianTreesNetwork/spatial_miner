plugins {
    id 'java'
    id 'eclipse'
    id 'idea'
    id 'net.neoforged.moddev' version '1.0.23'
}

version = '1.0.0'
group = 'com.rtn.spatialminer'
base.archivesName = 'spatialminer'

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

neoForge {
    version = '21.1.232'

    runs {
        client {
            client()
        }
        server {
            server()
        }
    }

    mods {
        spatialminer {
            sourceSet sourceSets.main
        }
    }
}

repositories {
    mavenCentral()
}

dependencies {
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}